  <link data-trunk rel="copy-file" href="favicon.svg" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="curve-fit" />
  <meta property="og:title" content="curve-fit" />
  <meta property="og:description"
    content="Curve fitting training app for exploring models and spline approximation by points. Интерактивное приложение для подбора кривых и сплайн-аппроксимации по точкам." />
  <meta property="og:url" content="https://curve-fit.hexq.ru/" />
  <meta property="og:locale" content="en_US" />

  <meta name="twitter:card" content="summary_large_image" />

    content="Curve fitting training app for exploring models and spline approximation by points. Интерактивное приложение для подбора кривых и сплайн-аппроксимации по точкам." />
  <meta name="twitter:image" content="https://curve-fit.hexq.ru/images/curve-fit-screenshot.png" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "curve-fit",
      "alternateName": "curve-fit — подбор кривой",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Any",
      "url": "https://curve-fit.hexq.ru/",
      "description": "Curve fitting training app for exploring models and spline approximation by points.",
      "inLanguage": ["en", "ru"],
      "image": "https://curve-fit.hexq.ru/images/curve-fit-screenshot.png",
      "screenshot": "https://curve-fit.hexq.ru/images/curve-fit-screenshot.png",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>
  <title>curve-fit</title>
  <style>
    :root {
      color-scheme: light dark;
      --app-bg: #f4f6f8;
      --app-loader-text: #2d3a45;
      --app-loader-spinner: #d0d7de;
      --app-loader-spinner-top: #4f6f8a;
      --app-loader-error: #8b1e1e;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --app-bg: #12181e;
        --app-loader-text: #dce3ea;
        --app-loader-spinner: #32404d;
        --app-loader-spinner-top: #86b5de;
        --app-loader-error: #ff9a9a;
      }
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family:
        "Segoe UI",
        "Segoe UI Symbol",
        "Noto Sans",
        "Noto Sans Symbols 2",
        sans-serif;
      background: var(--app-bg);
    }

    #curve_fit_canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .app-loader {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--app-bg);
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }

    .app-loader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.875rem;
      color: var(--app-loader-text);
    }

    #app_loader_spinner {
      width: 2.25rem;
      height: 2.25rem;
      border: 0.22rem solid var(--app-loader-spinner);
      border-top-color: var(--app-loader-spinner-top);
      border-radius: 50%;
      animation: app-loader-spin 0.75s linear infinite;
    }

    #app_loader_status {
      font-size: 0.95rem;
      letter-spacing: 0.01em;
    }

    .app-loader-error #app_loader_status {
      color: var(--app-loader-error);
    }

    @keyframes app-loader-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <noscript>
    curve-fit is an interactive curve fitting training app. curve-fit — интерактивное учебное
    приложение для подбора кривой.
  </noscript>
  <div id="app_loader" class="app-loader" role="status" aria-live="polite">
    <div class="app-loader-content">
      <div id="app_loader_spinner" aria-hidden="true"></div>
      <div id="app_loader_status">Loading application...</div>
    </div>
  </div>
  <canvas id="curve_fit_canvas"></canvas>
  <link data-trunk rel="rust" href="../Cargo.toml" data-wasm-opt="3"
    data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int --enable-simd" />
</body>

</html>
